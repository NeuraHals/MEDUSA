apiVersion: v1
kind: ConfigMap
metadata:
  name: mobile-interaction-config
  namespace: medusa-orchestration
data:
  ENV: "production"
  HTTP_ADDR: ":8087"
  KAFKA__BROKERS: "kafka-broker.kafka-cluster:9093"
  KAFKA_INPUT_TOPIC: "clinical.orchestration.execution.v1"
  KAFKA_OUTPUT_TOPIC: "clinical.orchestration.approval.v1"
  KAFKA_DLQ_TOPIC: "system.dlq.v1"
  KAFKA_CONSUMER_GROUP: "mobile-group"
  KAFKA_WORKER_COUNT: "4"
  REDIS_URL: "redis://redis-master.redis:6379"
  OTEL_ENDPOINT: "otel-collector.observability:4317"
  HOA_GRPC_ENDPOINT: "oversight-agent.medusa-orchestration:50051"
  SCHEMA_VERSION: "1.0.0"
  OFFLINE_QUEUE_TTL_SECS: "300"
  SESSION_TTL_SECS: "3600"
  DEGRADED_MODE: "false"
  TWILIO_BASE_URL: "https://api.twilio.com/2010-04-01"
