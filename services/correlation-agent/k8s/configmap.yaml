apiVersion: v1
kind: ConfigMap
metadata:
  name: correlation-agent-config
  namespace: medusa-orchestration
data:
  ENV: "production"
  HEALTH_ADDR: "0.0.0.0:8081"
  KAFKA__BROKERS: "kafka-broker.kafka-cluster:9093"
  KAFKA_INPUT_TOPIC: "external.telemetry.v1"
  KAFKA_OUTPUT_TOPIC: "clinical.orchestration.anomaly.v1"
  KAFKA_DLQ_TOPIC: "system.dlq.v1"
  KAFKA_CONSUMER_GROUP: "correlation-group"
  KAFKA_WORKER_POOL_SIZE: "8"
  REDIS_URL: "redis://redis-master.redis:6379"
  OTEL_ENDPOINT: "http://otel-collector.observability:4317"
  WINDOW_SECONDS: "600"
  ANOMALY_THRESHOLD: "0.72"
  SCHEMA_VERSION: "1.0.0"
