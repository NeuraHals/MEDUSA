env: development
http:
  addr: ":8088"
  read_timeout: "5s"
  write_timeout: "10s"
kafka:
  brokers:
    - "kafka-broker:9093"
  input_topics:
    - "clinical.orchestration.execution.v1"
    - "clinical.orchestration.blueprint.v1"
    - "clinical.orchestration.confidence.v1"
    - "clinical.orchestration.approval.v1"
    - "clinical.orchestration.notification.v1"
    - "external.telemetry.v1"
  dlq_topic: "system.dlq.v1"
  consumer_group: "audit-group"
  worker_count: 4
redis:
  url: "redis://redis-master:6379"
otel:
  endpoint: "otel-collector:4317"
schema:
  version: "1.0.0"
s3:
  bucket: "medusa-audit-worm"
  region: "us-east-1"
  prefix: "audit/"
  object_lock_mode: "COMPLIANCE"
  retention_days: 2555
  extended_retention_days: 3650
  forensic_retention_days: 9125
chain:
  hash_algorithm: "SHA-256"
