apiVersion: v1
kind: Service
metadata:
  name: orchestrator-agent
  namespace: medusa-execution
  labels:
    app: orchestrator-agent
spec:
  selector:
    app: orchestrator-agent
  ports:
  - name: http
    protocol: TCP
    port: 8084
    targetPort: 8084
  - name: grpc
    protocol: TCP
    port: 50052
    targetPort: 50052
  type: ClusterIP
