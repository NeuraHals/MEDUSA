apiVersion: v1
kind: ConfigMap
metadata:
  name: audit-agent-config
  namespace: medusa-audit
data:
  ENV: "production"
  HTTP_ADDR: ":8088"
  KAFKA__BROKERS: "kafka-broker.kafka-cluster:9093"
  KAFKA_INPUT_TOPICS: "clinical.orchestration.execution.v1,clinical.orchestration.blueprint.v1,clinical.orchestration.confidence.v1,clinical.orchestration.approval.v1,clinical.orchestration.notification.v1,external.telemetry.v1"
  KAFKA_DLQ_TOPIC: "system.dlq.v1"
  KAFKA_CONSUMER_GROUP: "audit-group"
  KAFKA_WORKER_COUNT: "4"
  REDIS_URL: "redis://redis-master.redis:6379"
  OTEL_ENDPOINT: "otel-collector.observability:4317"
  SCHEMA_VERSION: "1.0.0"
  S3_BUCKET: "medusa-audit-worm"
  S3_REGION: "us-east-1"
  S3_PREFIX: "audit/"
  S3_OBJECT_LOCK_MODE: "COMPLIANCE"
  S3_RETENTION_DAYS: "2555"
  S3_EXTENDED_RETENTION_DAYS: "3650"
  S3_FORENSIC_RETENTION_DAYS: "9125"
