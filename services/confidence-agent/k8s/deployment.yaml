apiVersion: apps/v1
kind: Deployment
metadata:
  name: confidence-agent
  namespace: medusa-orchestration
  labels:
    app: confidence-agent
    version: v1.0.0
spec:
  replicas: 3
  selector:
    matchLabels:
      app: confidence-agent
  template:
    metadata:
      labels:
        app: confidence-agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      priorityClassName: critical-execution
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
      - name: confidence-agent
        image: antigravity/confidence-agent:v1.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8082
          name: health
        envFrom:
        - configMapRef:
            name: confidence-agent-config
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8082
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
