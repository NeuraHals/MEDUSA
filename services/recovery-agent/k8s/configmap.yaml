apiVersion: v1
kind: ConfigMap
metadata:
  name: recovery-agent-config
  namespace: medusa-execution
data:
  ENV: "production"
  HTTP_ADDR: ":8089"
  KAFKA__BROKERS: "kafka-broker.kafka-cluster:9093"
  KAFKA_INPUT_TOPIC: "clinical.orchestration.rollback.v1"
  KAFKA_OUTPUT_TOPIC: "clinical.orchestration.recovery.v1"
  KAFKA_DLQ_TOPIC: "system.dlq.v1"
  KAFKA_CONSUMER_GROUP: "recovery-group"
  KAFKA_WORKER_COUNT: "4"
  REDIS_URL: "redis://redis-master.redis:6379"
  OTEL_ENDPOINT: "otel-collector.observability:4317"
  SCHEMA_VERSION: "1.0.0"
  MAX_RETRIES: "3"
  UNDO_TIMEOUT_SECS: "15"
  DEGRADED_MODE: "false"
  CB_FAILURE_THRESHOLD: "5"
  CB_RECOVERY_SECS: "30"
