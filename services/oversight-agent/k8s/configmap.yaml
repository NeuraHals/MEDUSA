apiVersion: v1
kind: ConfigMap
metadata:
  name: oversight-agent-config
  namespace: medusa-orchestration
data:
  ENV: "production"
  HTTP_ADDR: ":8085"
  GRPC_ADDR: ":50051"
  REDIS_URL: "redis://redis-master.redis:6379"
  KAFKA__BROKERS: "kafka-broker.kafka-cluster:9093"
  KAFKA_OUTPUT_TOPIC: "clinical.orchestration.approval.v1"
  KAFKA_DLQ_TOPIC: "system.dlq.v1"
  OTEL_ENDPOINT: "otel-collector.observability:4317"
  SCHEMA_VERSION: "1.0.0"
  APPROVAL_TIMEOUT_SECS: "60"
  DEGRADED_MODE: "false"
