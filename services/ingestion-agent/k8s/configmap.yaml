  HTTP_ADDR: ":8080"
  KAFKA_BROKERS: "kafka-broker.kafka-cluster:9093"
  KAFKA_TOPIC: "external.telemetry.v1"
  OTEL_ENDPOINT: "otel-collector.observability:4317"
  SCHEMA_VERSION: "1.0.0"
