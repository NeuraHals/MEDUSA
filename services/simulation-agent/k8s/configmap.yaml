apiVersion: v1
kind: ConfigMap
metadata:
  name: simulation-agent-config
  namespace: medusa-simulation
data:
  ENV: "production"
  HTTP_ADDR: "0.0.0.0:8090"
  SIPA__KAFKA__BROKERS: "kafka-broker.kafka-cluster:9093"
  SIPA__KAFKA__INPUT_TOPIC: "clinical.simulation.request.v1"
  SIPA__KAFKA__OUTPUT_TOPIC: "clinical.simulation.result.v1"
  SIPA__KAFKA__DLQ_TOPIC: "system.dlq.v1"
  SIPA__KAFKA__CONSUMER_GROUP: "simulation-group"
  SIPA__KAFKA__WORKER_COUNT: "8"
  SIPA__REDIS__URL: "redis://redis-master.redis:6379"
  SIPA__OTEL__ENDPOINT: "http://otel-collector.observability:4317"
  SIPA__SCHEMA_VERSION: "1.0.0"
  SIPA__SIMULATION__DEFAULT_MC_RUNS: "1000"
  SIPA__SIMULATION__WORKER_THREADS: "8"
  SIPA__SIMULATION__CHAOS_FACTOR: "0.15"
  SIPA__SIMULATION__GPU_ENABLED: "false"
  SIPA__SIMULATION__MAX_SIM_SECS: "120"
