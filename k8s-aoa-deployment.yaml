apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator-agent
  namespace: medusa-execution
  labels:
    app: orchestrator-agent
spec:
  replicas: 3
  selector:
    matchLabels:
      app: orchestrator-agent
  template:
    metadata:
      labels:
        app: orchestrator-agent
    spec:
      priorityClassName: critical-execution
      containers:
      - name: aoa
        image: antigravity/aoa:v1.0.0
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator-agent
  namespace: medusa-execution
spec:
  selector:
    app: orchestrator-agent
  ports:
  - protocol: TCP
    port: 50051
    targetPort: 50051
