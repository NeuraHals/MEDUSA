apiVersion: v1
kind: ConfigMap
metadata:
  name: messaging-agent-config
  namespace: medusa-orchestration
data:
  ENV: "production"
  HTTP_ADDR: ":8086"
  KAFKA__BROKERS: "kafka-broker.kafka-cluster:9093"
  KAFKA_INPUT_TOPIC: "clinical.orchestration.execution.v1"
  KAFKA_OUTPUT_TOPIC: "clinical.orchestration.notification.v1"
  KAFKA_DLQ_TOPIC: "system.dlq.v1"
  KAFKA_CONSUMER_GROUP: "messaging-group"
  KAFKA_WORKER_COUNT: "8"
  REDIS_URL: "redis://redis-master.redis:6379"
  OTEL_ENDPOINT: "otel-collector.observability:4317"
  SCHEMA_VERSION: "1.0.0"
  PAGERDUTY_BASE_URL: "https://events.pagerduty.com/v2/enqueue"
  TWILIO_BASE_URL: "https://api.twilio.com/2010-04-01"
  CB_FAILURE_THRESHOLD: "5"
  CB_RECOVERY_SECONDS: "30"
  MAX_RETRIES: "3"
  DEGRADED_MODE: "false"
