apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: audit-agent-netpol
  namespace: medusa-audit
spec:
  podSelector:
    matchLabels:
      app: audit-agent
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Accept health + replay queries from SOC tooling within the same namespace
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: medusa-audit
    ports:
    - protocol: TCP
      port: 8088
  egress:
  # Kafka — consume from all orchestration topics
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kafka-cluster
    ports:
    - protocol: TCP
      port: 9093
  # Redis — chain head and replay index
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: redis
    ports:
    - protocol: TCP
      port: 6379
  # OTel
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: observability
    ports:
    - protocol: TCP
      port: 4317
  # S3 WORM — HTTPS via VPC endpoint or internet
  - ports:
    - protocol: TCP
      port: 443
