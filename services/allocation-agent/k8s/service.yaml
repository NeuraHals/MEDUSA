apiVersion: v1
kind: Service
metadata:
  name: allocation-agent
  namespace: medusa-orchestration
  labels:
    app: allocation-agent
spec:
  selector:
    app: allocation-agent
  ports:
  - name: health
    protocol: TCP
    port: 8083
    targetPort: 8083
  - name: grpc
    protocol: TCP
    port: 50051
    targetPort: 50051
  type: ClusterIP
