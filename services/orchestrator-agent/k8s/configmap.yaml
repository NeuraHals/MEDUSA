apiVersion: v1
kind: ConfigMap
metadata:
  name: orchestrator-agent-config
  namespace: medusa-execution
data:
  ENV: "production"
  HTTP_ADDR: ":8084"
  GRPC_ADDR: ":50052"
  KAFKA_BROKERS: "kafka-broker.kafka-cluster:9093"
  KAFKA_INPUT_TOPIC: "clinical.orchestration.blueprint.v1"
  KAFKA_OUTPUT_TOPIC: "clinical.orchestration.execution.v1"
  KAFKA_DLQ_TOPIC: "system.dlq.v1"
  KAFKA_CONSUMER_GROUP: "orchestrator-group"
  KAFKA_WORKER_COUNT: "4"
  REDIS_URL: "redis://redis-master.redis:6379"
  OTEL_ENDPOINT: "otel-collector.observability:4317"
  HOA_GRPC_ENDPOINT: "oversight-agent.medusa-orchestration:50051"
  SCHEMA_VERSION: "1.0.0"
  EXECUTION_TIMEOUT_SECS: "30"
