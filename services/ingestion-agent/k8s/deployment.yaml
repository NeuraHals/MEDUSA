apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion-agent
  namespace: medusa-ingestion
  labels:
    app: ingestion-agent
    version: v1.0.0
    component: signal-ingestion
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ingestion-agent
  template:
    metadata:
      labels:
        app: ingestion-agent
        version: v1.0.0
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      priorityClassName: critical-execution
      serviceAccountName: ingestion-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
      - name: ingestion-agent
        image: antigravity/ingestion-agent:v1.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9090
          name: metrics
        envFrom:
        - configMapRef:
            name: ingestion-agent-config
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 3
        volumeMounts:
        - name: config-volume
          mountPath: /config
      volumes:
      - name: config-volume
        configMap:
          name: ingestion-agent-config
