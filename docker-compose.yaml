version: "3.9"

# MEDUSA local development infrastructure stack.
# Provides Kafka, Zookeeper, Redis, OTel Collector, and Jaeger.
# Run with: docker compose up -d

networks:
  medusa:
    driver: bridge

volumes:
  kafka-data:
  redis-data:
  zookeeper-data:

services:

  # ── Zookeeper ──────────────────────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: medusa-zookeeper
    networks: [medusa]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ─────────────────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: medusa-kafka
    networks: [medusa]
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Kafka topic provisioner ────────────────────────────────────────────────
  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    container_name: medusa-kafka-init
    networks: [medusa]
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic external.telemetry.v1 --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic clinical.crisis.event.v1 --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic clinical.orchestration.blueprint.v1 --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic clinical.orchestration.execution.v1 --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic clinical.orchestration.approval.v1 --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic clinical.orchestration.rollback.v1 --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic clinical.orchestration.recovery.v1 --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic clinical.orchestration.notification.v1 --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic clinical.orchestration.confidence.v1 --partitions 6 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic clinical.simulation.request.v1 --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic clinical.simulation.result.v1 --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic system.dlq.v1 --partitions 3 --replication-factor 1
      echo 'All MEDUSA topics created.'
      "

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: medusa-redis
    networks: [medusa]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── OTel Collector ────────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.98.0
    container_name: medusa-otel
    networks: [medusa]
    ports:
      - "4317:4317"    # gRPC
      - "4318:4318"    # HTTP
      - "8889:8889"    # Prometheus metrics scrape
    volumes:
      - ./infra/otel/otel-collector.yaml:/etc/otelcol-contrib/config.yaml
    depends_on:
      - jaeger

  # ── Jaeger ────────────────────────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.56
    container_name: medusa-jaeger
    networks: [medusa]
    ports:
      - "16686:16686"   # UI
      - "14250:14250"   # gRPC ingest from OTel

  # ── Kafka UI (development convenience) ───────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: medusa-kafka-ui
    networks: [medusa]
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: medusa-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: "kafka:9092"
    depends_on:
      kafka:
        condition: service_healthy
