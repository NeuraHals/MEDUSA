apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: messaging-agent-netpol
  namespace: medusa-orchestration
spec:
  podSelector:
    matchLabels:
      app: messaging-agent
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Internal health probe only — no inbound service traffic
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: medusa-orchestration
    ports:
    - protocol: TCP
      port: 8086
  egress:
  # Kafka
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kafka-cluster
    ports:
    - protocol: TCP
      port: 9093
  # Redis
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: redis
    ports:
    - protocol: TCP
      port: 6379
  # OTel
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: observability
    ports:
    - protocol: TCP
      port: 4317
  # External provider APIs: PagerDuty, Twilio, APNs, FCM (HTTPS)
  - ports:
    - protocol: TCP
      port: 443
